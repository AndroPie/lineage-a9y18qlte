version: 2.1

jobs:
  build_lineage:
    docker:
      - image: cimg/android:2023.10
    resource_class: large
    environment:
      USE_CCACHE: 1
      CCACHE_DIR: /home/circleci/project/.ccache
    steps:
      - checkout

      - run:
          name: Install Dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y ccache bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev
            echo 'export PATH="/usr/lib/ccache:$PATH"' >> $BASH_ENV

      - run:
          name: Setup Git & Repo
          command: |
            mkdir -p ~/bin
            curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
            chmod a+x ~/bin/repo
            git config --global user.email "builder@circleci.com"
            git config --global user.name "CircleCI Builder"

      - run:
          name: Initialize and Sync
          command: |
            export PATH="$HOME/bin:$PATH"
            mkdir -p android && cd android
            repo init -u https://github.com/LineageOS/android.git -b lineage-18.1 --depth=1
            
            mkdir -p .repo/local_manifests
            cat \<<EOF > .repo/local_manifests/roomservice.xml
            <?xml version="1.0" encoding="UTF-8"?>
            <manifest>
                <remote name="doll" fetch="https://github.com/majaahh" revision="lineage-18.1" />
                <remote name="los" fetch="https://github.com/LineageOS" revision="lineage-18.1" />

                <project path="device/samsung/a9y18qlte" name="device_samsung_a9y18qlte" remote="doll" />
                <project path="kernel/samsung/a9y18qlte" name="kernel_samsung_a9y18qlte" remote="doll" revision="aosp" />
                <project path="vendor/samsung/a9y18qlte" name="vendor_samsung_a9y18qlte" remote="doll" />

                <project path="hardware/qcom-caf/sdm660/display" name="android_hardware_qcom_display" groups="pdk-qcom,sdm660" remote="los" revision="lineage-18.1-caf-sdm660" />
                <project path="hardware/qcom-caf/sdm660/audio" name="android_hardware_qcom_audio" groups="pdk-qcom,sdm660" remote="los" revision="lineage-18.1-caf-sdm660" />
                <project path="hardware/qcom-caf/sdm660/media" name="android_hardware_qcom_media" groups="pdk-qcom,sdm660" remote="los" revision="lineage-18.1-caf-sdm660" />
                
                <project path="device/samsung_slsi/sepolicy" name="android_device_samsung_slsi_sepolicy" remote="los" />
                <project path="hardware/samsung" name="android_hardware_samsung" remote="los" />
            </manifest>
            EOF
            
            repo sync -c -j4 --force-sync --no-clone-bundle --no-tags

      - run:
          name: Compile Android Image
          no_output_timeout: 60m
          command: |
            export PATH="$HOME/bin:$PATH"
            ccache -M 30G
            cd android
            # Delete .repo to ensure enough disk space for the build output
            rm -rf .repo
            source build/envsetup.sh
            lunch lineage_a9y18qlte-userdebug
            mka bacon -j$(nproc --all)

      - store_artifacts:
          path: android/out/target/product/a9y18qlte/
          destination: a9y18qlte-lineage

workflows:
  build_workflow:
    jobs:
      - build_lineage
